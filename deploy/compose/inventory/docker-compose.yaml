services:
  mongo-grpc:
    image: mongo:7.0.5
    container_name: inventory_service_db
    environment:
      MONGO_INITDB_DATABASE: inventory-service
      MONGO_INITDB_ROOT_USERNAME: inventory-service-user
      MONGO_INITDB_ROOT_PASSWORD: mongo

    volumes:
      - inventory_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'db.runCommand({ ping: 1 }).ok' | mongosh --quiet -u inventory-service -p mongo --authenticationDatabase admin",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - microservices-net
volumes:
  inventory_data:
networks:
  microservices-net:
    external: true
