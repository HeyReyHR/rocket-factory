parameters:
  - name: X-Session-UUID
    in: header
    description: Session UUID for user context
    required: true
    schema:
      type: string
post:
  summary: Requests an order
  operationId: PostOrder
  tags:
    - Order
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/create_order_request.yaml"
  responses:
    '200':
      description: Order requested
      content:
        application/json:
          schema:
            $ref: "../components/create_order_response.yaml"
    '400':
      description: Parts out of stock or don't exist
      content:
        application/json:
          schema:
            $ref: "../components/errors/bad_request_error.yaml"
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "../components/errors/internal_server_error.yaml"
    default:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: ../components/errors/generic_error.yaml
