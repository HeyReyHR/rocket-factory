parameters:
  - $ref: "../params/order_uuid.yaml"
post:
  summary: Order payment
  operationId: PayOrder
  tags:
    - Order
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/order_pay_request.yaml"
  responses:
    '200':
      description: Order paid
      content:
        application/json:
          schema:
            $ref: "../components/order_pay_response.yaml"
    '400':
      description: Could not proceed payment
      content:
        application/json:
          schema:
            $ref: "../components/errors/bad_request_error.yaml"
    '404':
      description: Order not found
      content:
        application/json:
          schema:
            $ref: "../components/errors/not_found_error.yaml"
    default:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "../components/errors/internal_server_error.yaml"