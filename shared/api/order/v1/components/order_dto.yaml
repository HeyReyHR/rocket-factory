type: object
required:
  - uuid
  - user_uuid
  - part_uuids
  - total_price
  - status
properties:
  uuid:
    type: string
    description: order UUID
    minLength: 1
    example: "1"
  user_uuid:
    type: string
    description: user UUID
    minLength: 1
    example: "1"
  part_uuids:
    type: array
    items:
      type: string
    description: UUIDs of parts
    example: ["1", "2", "3"]
  total_price:
    type: number
    format: double
    description: Estimated cost
    example: 123.45
  transaction_uuid:
    type: string
    description: transaction UUID
    minLength: 1
    example: "1"
  payment_method:
    $ref: "./enums/payment_method.yaml"
  status:
    $ref: "./enums/order_status.yaml"

