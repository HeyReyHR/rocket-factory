syntax="proto3";
import "google/protobuf/timestamp.proto";

package inventory.v1;

option go_package = "github.com/HeyReyHR/rocket-factory/shared/pkg/proto/inventory/v1;inventory_v1";

service InventoryService{
  // Returns part information via its UUID
  rpc GetPart(GetPartRequest) returns(GetPartResponse);
  // Returns list of parts with filtering ability
  rpc ListParts(ListPartsRequest) returns(ListPartsResponse);
}
// ListPartsRequest
message ListPartsRequest{
  optional PartsFilter filter = 1;
}
// ListPartsResponse
message ListPartsResponse{
  repeated Part parts = 1;
}
// GetPartRequest
message GetPartRequest{
  string uuid = 1;
}
// GetPartResponse
message GetPartResponse{
  Part part = 1;
}

// Optional filter to list certain parts
message PartsFilter {
  // list of UUIDs
  repeated string uuids = 1;
  // list of names
  repeated string names = 2;
  // list of categories
  repeated Category categories = 3;
  // list of manufacturer countries
  repeated string manufacturer_countries = 4;
  // list of tags
  repeated string tags = 5;
}
// part dimensions
message Dimensions{
  double length = 1;
  double width = 2;
  double height = 3;
  double weight = 4;
}

// rocket part
message Part{
  string uuid = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int64 stock_quantity = 5;
  Category category = 6;
  Manufacturer manufacturer = 7;
  repeated string tags = 8;
  map<string, Value> metadata = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}
// manufacturer
message Manufacturer{
  string name = 1;
  string country = 2;
  string website = 3;
}
// idk tf is ts
message Value {
  oneof value_type{
    string string_value = 1;
    int64 int64_value = 2;
    double double_value = 3;
    bool bool_value = 4;
  }
}
// part category
enum Category {
  UNKNOWN = 0;
  ENGINE = 1;
  FUEL = 2;
  PORTHOLE = 3;
  WING = 4;
}